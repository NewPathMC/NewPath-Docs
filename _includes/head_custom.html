<link rel="stylesheet" href="{{ '/assets/css/newpath.css' | relative_url }}">

<link rel="icon" type="image/png" sizes="64x64" href="{{ '/assets/images/favicon.png' | relative_url }}">
<link rel="shortcut icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">

<meta name="theme-color" content="#112e40">
<meta name="color-scheme" content="dark">

<script src="{{ site.baseurl }}/assets/js/search-jump.js" defer></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.body.classList.add(document.querySelector(".np-home") ? "np-page-home" : "np-page-sub");

    const header = document.querySelector(".main-header");
    if (!header || header.querySelector(".np-top-nav")) {
      return;
    }

    const baseUrl = "{{ site.baseurl }}";

    const brand = document.createElement("div");
    brand.className = "np-topbar-brand";
    brand.setAttribute("aria-label", "NewPath – Echoes of the Wild");
    brand.innerHTML = `
      <img class="np-topbar-logo" src="${baseUrl}/assets/images/logo.png" alt="" width="64" height="64" decoding="async">
      <span class="np-topbar-title">
        <span>NewPath</span>
        <span>Echoes of the Wild</span>
      </span>
    `;

    const nav = document.createElement("nav");
    nav.className = "np-top-nav";
    nav.setAttribute("aria-label", "Hauptnavigation");

    const links = [
      ["Startseite", baseUrl + "/"],
      ["Regeln", baseUrl + "/regelwerk.html"],
      ["Server & Welt", baseUrl + "/server.html"],
      ["Modpack Hilfe", baseUrl + "/modpack-hilfe.html"],
      ["FAQ", baseUrl + "/faq.html"],
      ["Team", baseUrl + "/team.html"],
      ["Streamer", baseUrl + "/streamer.html"],
      ["Galerie", baseUrl + "/galerie.html"]
    ];

    const currentPath = window.location.pathname.replace(/\/index\.html$/, "/");

    links.forEach(function ([label, href]) {
      const link = document.createElement("a");
      link.href = href;
      link.textContent = label;

      const linkPath = new URL(href, window.location.origin).pathname.replace(/\/index\.html$/, "/");
      if (currentPath === linkPath) {
        link.classList.add("active");
        link.setAttribute("aria-current", "page");
      }

      nav.appendChild(link);
    });

    header.prepend(nav);
    header.prepend(brand);
  });
</script>
<script>

    if (!document.querySelector("#np-mobile-header")) {
      const mobileHeader = document.createElement("header");
      mobileHeader.id = "np-mobile-header";
      mobileHeader.innerHTML = `

      const button = mobileHeader.querySelector(".np-mobile-menu-button");
      const menu = mobileHeader.querySelector(".np-mobile-menu");

      button.addEventListener("click", function () {
        const isOpen = mobileHeader.classList.toggle("is-open");
        button.setAttribute("aria-expanded", String(isOpen));
        button.textContent = isOpen ? "×" : "☰";
