<link rel="stylesheet" href="{{ '/assets/css/newpath.css' | relative_url }}">

<link rel="icon" type="image/png" sizes="64x64" href="{{ '/assets/images/favicon.png' | relative_url }}">
<link rel="shortcut icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">

<meta name="theme-color" content="#112e40">
<meta name="color-scheme" content="dark">

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const header = document.querySelector(".main-header");

    if (!header || header.querySelector(".np-top-nav")) {
      return;
    }

    const baseUrl = "{{ site.baseurl }}";

    const brand = document.createElement("div");
    brand.className = "np-topbar-brand";
    brand.setAttribute("aria-label", "NewPath – Echoes of the Wild");
    brand.innerHTML = `
      <img class="np-topbar-logo" src="${baseUrl}/assets/images/logo.png" alt="" width="64" height="64" decoding="async">
      <span class="np-topbar-title">
        <span>NewPath</span>
        <span>Echoes of the Wild</span>
      </span>
    `;

    const nav = document.createElement("nav");
    nav.className = "np-top-nav";
    nav.setAttribute("aria-label", "Hauptnavigation");

    const links = [
      ["Startseite", baseUrl + "/"],
      ["Regelwerk", baseUrl + "/regelwerk.html"],
      ["Philosophie", baseUrl + "/philosophie.html"],
      ["FAQ", baseUrl + "/faq.html"],
      ["Modpack Hilfe", baseUrl + "/modpack-hilfe.html"],
      ["Team", baseUrl + "/team.html"],
      ["Streamer", baseUrl + "/streamer.html"]
    ];

    const currentPath = window.location.pathname.replace(/\/index\.html$/, "/");

    links.forEach(function ([label, href]) {
      const link = document.createElement("a");
      link.href = href;
      link.textContent = label;

      const linkPath = new URL(href, window.location.origin).pathname.replace(/\/index\.html$/, "/");
      if (currentPath === linkPath) {
        link.classList.add("active");
        link.setAttribute("aria-current", "page");
      }

      nav.appendChild(link);
    });

    header.prepend(nav);
    header.prepend(brand);
  });
</script>


<script>
  document.addEventListener("DOMContentLoaded", function () {
    const existing = document.querySelectorAll("#np-global-window-footer");
    existing.forEach(function (item, index) {
      if (index > 0) item.remove();
    });

    let footer = document.getElementById("np-global-window-footer");

    if (!footer) {
      footer = document.createElement("footer");
      footer.id = "np-global-window-footer";
      footer.className = "np-site-footer";
      footer.setAttribute("aria-label", "NewPath Fußzeile");
      footer.innerHTML = `
        <div class="np-site-footer-inner">
          <div class="np-site-footer-brand">
            <strong>NewPath – Echoes of the Wild</strong>
            <span>Offizielle Dokumentation · Community · Modpack-Hilfe</span>
          </div>
          <nav class="np-site-footer-links" aria-label="Footer Navigation">
            <a href="{{ site.baseurl }}/">Startseite</a>
            <a href="{{ site.baseurl }}/modpack-hilfe.html">Modpack Hilfe</a>
            <a href="{{ site.baseurl }}/team.html">Team</a>
            <a href="{{ site.baseurl }}/streamer.html">Streamer</a>
            <a href="{{ site.baseurl }}/regelwerk.html">Regelwerk</a>
            <a href="{{ site.baseurl }}/faq.html">FAQ</a>
            <a href="https://discord.gg/R4HwKRbZ5e" target="_blank" rel="noopener">Discord</a>
            <span>© 2026 NewPath</span>
          </nav>
        </div>
      `;
      document.body.appendChild(footer);
    }

    document.querySelectorAll(".np-site-footer:not(#np-global-window-footer)").forEach(function (oldFooter) {
      oldFooter.remove();
    });
  });
</script>
