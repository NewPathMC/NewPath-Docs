name: Update Markdown timestamps

on:
  push:
    branches:
      - main
    paths:
      - "index.md"
      - "regelwerk.md"
      - "philosophie.md"
      - "faq.md"
      - "serverinfos.md"

permissions:
  contents: write

jobs:
  update-md-timestamps:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git konfigurieren
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Geänderte Website-Markdown-Dateien ermitteln
        id: changed-files
        shell: bash
        run: |
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT "${{ github.event.before }}" "${{ github.sha }}" -- index.md regelwerk.md philosophie.md faq.md serverinfos.md || true)

          echo "Geänderte Website-Dateien:"
          echo "$CHANGED_FILES"

          {
            echo "files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Zeitstempel aktualisieren
        if: steps.changed-files.outputs.files != ''
        shell: bash
        run: |
          TIMESTAMP=$(TZ="Europe/Berlin" date +"%d.%m.%Y %H:%M Uhr")

          echo "${{ steps.changed-files.outputs.files }}" | while IFS= read -r file; do
            if [ -z "$file" ]; then
              continue
            fi

            if [ ! -f "$file" ]; then
              continue
            fi

            echo "Aktualisiere Zeitstempel in: $file"

            if grep -q "<!-- AUTO_UPDATED_START -->" "$file"; then
              sed -i "/<!-- AUTO_UPDATED_START -->/,/<!-- AUTO_UPDATED_END -->/c\\<!-- AUTO_UPDATED_START -->\n<p class=\"np-last-updated\">Zuletzt aktualisiert: $TIMESTAMP</p>\n<!-- AUTO_UPDATED_END -->" "$file"
            fi
          done

      - name: Änderungen committen
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Keine Zeitstempel-Änderungen vorhanden."
            exit 0
          fi

          git add index.md regelwerk.md philosophie.md faq.md serverinfos.md
          git commit -m "Doku: Zeitstempel aktualisiert"
          git push