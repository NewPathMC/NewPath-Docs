name: Update Markdown timestamps

on:
  push:
    branches:
      - main
    paths:
      - "regelwerk.md"
      - "faq.md"
      - "modpack-hilfe.md"
      - "server.md"
      - "team.md"
      - "streamer.md"
      - "ente.md"

permissions:
  contents: write

jobs:
  update-md-timestamps:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git konfigurieren
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Geänderte Website-Markdown-Dateien ermitteln
        id: changed-files
        shell: bash
        run: |
          TARGET_FILES=(
            regelwerk.md
            faq.md
            modpack-hilfe.md
            server.md
            team.md
            streamer.md
            ente.md
          )

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" -- "${TARGET_FILES[@]}" || true)
          else
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT "${{ github.event.before }}" "${{ github.sha }}" -- "${TARGET_FILES[@]}" || true)
          fi

          echo "Geänderte Website-Dateien:"
          echo "$CHANGED_FILES"

          {
            echo "files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Regelwerksänderungen für Website-Markierung erzeugen
        if: contains(steps.changed-files.outputs.files, 'regelwerk.md')
        shell: bash
        run: |
          python scripts/generate_rule_changes.py             --before "${{ github.event.before }}"             --after "${{ github.sha }}"             --file "regelwerk.md"             --output "assets/data/rule-changes.json"

      - name: Zeitstempel aktualisieren
        if: steps.changed-files.outputs.files != ''
        shell: bash
        run: |
          TIMESTAMP=$(TZ="Europe/Berlin" date +"%d.%m.%Y %H:%M Uhr")

          echo "${{ steps.changed-files.outputs.files }}" | while IFS= read -r file; do
            if [ -z "$file" ]; then
              continue
            fi

            if [ ! -f "$file" ]; then
              echo "Überspringe gelöschte/nicht vorhandene Datei: $file"
              continue
            fi

            echo "Aktualisiere Zeitstempel in: $file"

            if grep -q "<!-- AUTO_UPDATED_START -->" "$file"; then
              sed -i "/<!-- AUTO_UPDATED_START -->/,/<!-- AUTO_UPDATED_END -->/c\<!-- AUTO_UPDATED_START -->
<p class=\"np-last-updated\">Zuletzt aktualisiert: $TIMESTAMP</p>
<!-- AUTO_UPDATED_END -->" "$file"
            else
              echo "Kein AUTO_UPDATED-Block gefunden in: $file"
            fi
          done

      - name: Änderungen committen
        shell: bash
        run: |
          if [ -f assets/data/rule-changes.json ]; then
            git add assets/data/rule-changes.json
          fi

          echo "${{ steps.changed-files.outputs.files }}" | while IFS= read -r file; do
            if [ -n "$file" ] && [ -f "$file" ]; then
              git add "$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "Keine automatischen Änderungen vorhanden."
            exit 0
          fi

          git commit -m "Doku: Zeitstempel und Regelwerksmarkierungen aktualisiert"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
